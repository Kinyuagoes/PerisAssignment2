<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <style>
        fieldset {
            width: 250px;
            padding: 15px;
        }
        .form-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Student Registration</h1>

    <nav>
        <a href="index.html">Home (Current Page)</a> | 
        <a href="pagetwo.html">Page Two</a>
    </nav>
    <br><br>

    <form name="studentDetail" action="#" method="POST" onsubmit="return handleFormSubmit(event)">
        <fieldset>
            <legend>Student Details</legend>

            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number:</label>
                <input type="text" id="phone" name="phone" onkeypress="return isNumberKey(event)">
            </div>

            <input type="submit" value="Submit">
        </fieldset>
    </form>

    <script>
        function isNumberKey(evt) {
            var charCode = (evt.which) ? evt.which : evt.keyCode;
            if (charCode > 31 && (charCode < 48 || charCode > 57)) {
                return false;
            }
            return true;
        }

        function handleFormSubmit(event) {
            event.preventDefault();
            alert("Detail submitted");
            return true;
        }
    </script>

</body>
</html>
